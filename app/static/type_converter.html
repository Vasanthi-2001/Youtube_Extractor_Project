<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Type Converter</title>

<style>

/* ================= BASE ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    height: 100vh;
    overflow: hidden;
}

/* ================= CENTER CARD ================= */
.center-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.card {
    background: white;
    padding: 45px;
    border-radius: 18px;
    width: 500px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

/* ================= FORM ================= */
input, select, button {
    width: 100%;
    height: 46px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
    padding: 0 14px;
    box-sizing: border-box;
    transition: 0.2s ease;
}

input:focus, select:focus {
    outline: none;
    border-color: #4facfe;
    box-shadow: 0 0 0 3px rgba(79,172,254,0.2);
}

.card button {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    color: white;
    font-weight: 600;
    border: none;
    cursor: pointer;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

button:disabled {
    background: #aaa;
    cursor: not-allowed;
}

#status {
    min-height: 20px;
    font-size: 14px;
    color: #333;
}

/* ================= RIGHT HISTORY PANEL ================= */
.right-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 340px;
    height: 100vh;
    padding: 25px;
    box-sizing: border-box;
    background: linear-gradient(180deg, #f8fbff, #eaf3ff);
    color: #1e293b;
    overflow-y: auto;
    border-left: 1px solid rgba(0,0,0,0.05);
    box-shadow: -6px 0 25px rgba(0,0,0,0.08);
}

.right-panel h3 {
    margin-top: 0;
    margin-bottom: 20px;
    font-weight: 600;
    color: #0f172a;
}

.right-panel::-webkit-scrollbar {
    width: 6px;
}
.right-panel::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
}

/* ================= AUDIO ITEMS ================= */
.audio-item {
    background: white;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.2s ease;
}

.audio-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

.audio-item audio {
    width: 100%;
    margin-top: 8px;
}

.audio-item a {
    display: block;
    margin-top: 10px;
    padding: 8px;
    background: linear-gradient(90deg, #4facfe, #00c6ff);
    color: white;
    text-align: center;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
}

.delete-btn {
    width: 100%;
    margin-top: 8px;
    background: linear-gradient(90deg, #ff7b7b, #ff4d4d);
    border: none;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: white;
}

</style>
</head>

<body>

<!-- CENTER CARD -->
<div class="center-wrapper">
    <div class="card">
        <h2>🎵 Audio Type Converter</h2>

        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg">

        <select id="format">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="ogg">OGG</option>
        </select>

        <button id="convertBtn" onclick="convertAudio()">Convert Audio</button>
        <p id="status"></p>
    </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
    <h3>Converted Audios</h3>
    <div id="audioList"></div>
</div>

<script>

async function convertAudio() {

    const btn = document.getElementById("convertBtn");
    const fileInput = document.getElementById("audioFile");
    const format = document.getElementById("format").value;

    if (!fileInput.files.length) {
        document.getElementById("status").innerText = "❌ Select Audio File";
        return;
    }

    btn.disabled = true;
    document.getElementById("status").innerText = "⏳ Converting...";

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("output_format", format);

    try {

        const res = await fetch("/convert-type", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.status === "success") {
            addAudioItem(data.filename);
            document.getElementById("status").innerText = "✅ Conversion Complete";
        } else {
            document.getElementById("status").innerText =
                "❌ " + (data.message || "Error");
        }

    } catch (error) {
        document.getElementById("status").innerText = "❌ Server Error";
        console.error(error);
    }

    btn.disabled = false;
}

function addAudioItem(filename) {
    const list = document.getElementById("audioList");
    const audioUrl = `/download/${filename}`;

    const div = document.createElement("div");
    div.className = "audio-item";

    div.innerHTML = `
        <strong>🎵 Converted Audio</strong>
        <audio controls src="${audioUrl}"></audio>
        <a href="${audioUrl}" download>Download</a>
        <button class="delete-btn">Delete</button>
    `;

    div.querySelector(".delete-btn").onclick = async () => {
        await fetch(`/delete/${filename}`, { method: "DELETE" });
        div.remove();
    };

    list.prepend(div);
}

async function loadHistory() {
    const res = await fetch("/history/type_converter");
    const data = await res.json();
    data.reverse().forEach(item => addAudioItem(item.filename));
}

window.onload = loadHistory;

</script>

</body>
</html>
